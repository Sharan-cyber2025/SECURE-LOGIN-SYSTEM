<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
body{
    background-color:#f0f2f5;
    font-family:Arial;
}
.login-box{
    width:300px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    text-align:center;
}
input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid gray;
}
button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
a{
    text-decoration:none;
}
</style>
</head>
<body>
<div class="login-box">
<h2>Login</h2>
<form method="POST">
<input type="text" name="username" placeholder="Enter Username" required>
<input type="password" name="password" placeholder="Enter Password" required>
<button type="submit">Login</button>
</form>
<br>
<a href="/register">Create New Account</a>
</div>
</body>
</html>
